apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment
  labels:
    app: react-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: react-app
  template:
    metadata:
      labels:
        app: react-app
    spec:
      containers:
      - name: react-app
        image: mcorries/react-app:latest # <- This targets your private repo target cleanly
        ports:
        - containerPort: 3000
        # FIXED 1: Injected environment maps to bypass prompts and open ports automatically
        env:
        - name: CI
          value: "true"
        - name: HOST
          value: "0.0.0.0"
        # FIXED 2: Interactive terminal bindings hardlocked to keep the Node process running
        stdin: true
        tty: true
      imagePullSecrets:
      - name: private-dockerhub-secret
